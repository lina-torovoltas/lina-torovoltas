name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide=makefile&title_color=ffa657&text_color=e6e6e6&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - FasmMacroLib
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=FasmMacroLib&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-fasmmacrolib.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - SoryneOS
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=SoryneOS&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-soryneos.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - WebServer
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=WebServer&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-webserver.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - Opcoder
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=Opcoder&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-opcoder.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - VRS-454
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=VRS-454&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-vrs454.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - Drapixcol
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=Drapixcol&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-drapixcol.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - Website
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=lina-torovoltas.github.io&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-website.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - 0xNULL_Bot-telegram
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=0xNULL_Bot-telegram&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-0xnullbot.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - Repo_Backuper
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=Repo_Backuper&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-repobackuper.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - Random-DumpGen
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=lina-torovoltas&repo=Random-DumpGen&title_color=ffa657&text_color=e6e6e6&icon_color=ffa657&bg_color=0d1117&border_color=30363d&cache_seconds=0
          path: profile/pin-randomdumpgen.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Calculate World Line Divergence
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python3 main.py

      - name: Bust cache in README
        run: |
          TS=$(date +%s)
          sed -i -E "s#(profile/[a-zA-Z0-9_-]+\.svg)(\?v=[0-9]+)?#\1?v=${TS}#g" README.md

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg README.md divergence_history.txt
          git commit -m "Update README cards" || exit 0
          git pull --rebase origin main
          git push
